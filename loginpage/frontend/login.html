<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AmbulanceOS — Login</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

<!-- Map background using OpenStreetMap tile -->
<div class="map-bg">
    <img src="https://tile.openstreetmap.org/6/40/25.png" alt="" aria-hidden="true"/>
    <div class="map-overlay"></div>
</div>

<div class="card">

    <!-- Logo -->
    <div class="brand">
        <div class="brand-icon">
            <i class="fas fa-truck-medical"></i>
        </div>
        <div class="brand-text">
            <span class="brand-name">AmbulanceOS</span>
            <span class="brand-sub">Route Optimization System</span>
        </div>
    </div>

    <h2 id="form-title">Welcome back</h2>
    <p class="form-sub" id="form-sub">Sign in to your account</p>

    <!-- Register-only field -->
    <div class="field" id="name-field" style="display:none">
        <label>Full Name</label>
        <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" id="name" placeholder="Enter your name"/>
        </div>
    </div>

    <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="Enter your email"/>
        </div>
    </div>

    <div class="field">
        <label>Password</label>
        <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Enter your password"/>
            <i class="fas fa-eye toggle-pw" onclick="togglePassword()" id="eyeIcon"></i>
        </div>
    </div>

    <div id="message"></div>

    <button class="btn-primary" id="submit-btn" onclick="handleSubmit()">
        <span id="btn-text">Sign In</span>
    </button>

    <p class="divider"><span>or continue with</span></p>

    <!-- Social Login -->
    <div class="social-btns">
        <button class="btn-social btn-google" onclick="socialLogin('Google')">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
        </button>
        <button class="btn-social btn-facebook" onclick="socialLogin('Facebook')">
            <i class="fab fa-facebook-f"></i>
            Continue with Facebook
        </button>
    </div>

    <p class="toggle-text" id="toggle-text">
        Don't have an account? <span onclick="toggleForm()">Create one</span>
    </p>

</div>

<script src="script.js"></script>
</body>
</html>
