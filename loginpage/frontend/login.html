<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambulance Login/Register</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="logo">🚑</div>
    <h2 id="form-title">Ambulance Login</h2>

    <div class="input-box">
        <input type="text" id="email" placeholder="Enter Email">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter Password">
    </div>

    <button id="submit-btn" onclick="login()">Login</button>

    <p id="toggle-text">Don't have an account? <span onclick="toggleForm()">Register</span></p>

    <div class="social-icons">
        <p>Or sign in with</p>
        <div class="icons">
            <img src="google.png" alt="Google" onclick="socialLogin('Google')">
            <img src="facebook.png" alt="Facebook" onclick="socialLogin('Facebook')">
        </div>
    </div>

    <div id="message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
